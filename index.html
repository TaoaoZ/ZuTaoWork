<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>企业经营管理驾驶舱 · 交互原型</title>
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <main class="prototype-shell">
      <section class="workspace">
        <div class="phone" aria-label="移动端交互原型">
          <div id="page-stack" class="page-stack" aria-live="polite">
            <iframe id="page-frame" class="route-frame is-active" data-route-frame="overview" title="企业经营管理驾驶舱总览" src="./overview.html"></iframe>
          </div>
          <div id="indicator-modal" class="modal-layer" hidden>
            <button class="modal-backdrop" type="button" data-close-modal aria-label="关闭弹窗"></button>
            <section class="indicator-dialog" role="dialog" aria-modal="true" aria-labelledby="indicator-title">
              <header class="dialog-header">
                <div>
                  <span>统计列表与明细详情</span>
                  <h2 id="indicator-title">指标健康情况</h2>
                </div>
                <button class="dialog-close" type="button" data-close-modal aria-label="关闭">×</button>
              </header>
              <div id="indicator-content"></div>
            </section>
          </div>
          <div id="action-sheet" class="sheet-layer" hidden>
            <button class="sheet-backdrop" type="button" data-close-sheet aria-label="关闭面板"></button>
            <section class="action-sheet" role="dialog" aria-modal="true" aria-labelledby="sheet-title">
              <header class="sheet-header">
                <div>
                  <span id="sheet-eyebrow">操作面板</span>
                  <h2 id="sheet-title">详细信息</h2>
                </div>
                <button class="sheet-close" type="button" data-close-sheet aria-label="关闭">×</button>
              </header>
              <div id="sheet-content" class="sheet-content"></div>
            </section>
          </div>
          <section id="company-page" class="company-page" aria-labelledby="company-page-title" hidden>
            <header class="company-page-header">
              <button class="company-back" type="button" data-close-company aria-label="返回">‹</button>
              <div>
                <span>统计范围</span>
                <h2 id="company-page-title">切换公司</h2>
              </div>
            </header>
            <div class="company-current">
              <span>当前选中</span>
              <strong id="company-current-name">深圳市天健城市服务有限公司</strong>
            </div>
            <label class="company-search">
              <span aria-hidden="true"></span>
              <input id="company-search-input" type="search" placeholder="搜索公司名称、区域或编码" autocomplete="off" />
            </label>
            <div id="company-result-meta" class="company-result-meta"></div>
            <div id="company-list" class="company-list" role="listbox" aria-label="公司列表"></div>
            <div id="company-confirm" class="company-confirm-layer" hidden>
              <button class="company-confirm-backdrop" type="button" data-cancel-company aria-label="取消切换"></button>
              <section class="company-confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="company-confirm-title">
                <span>切换确认</span>
                <h3 id="company-confirm-title">确认切换公司？</h3>
                <p id="company-confirm-copy"></p>
                <div class="company-confirm-actions">
                  <button type="button" data-cancel-company>取消</button>
                  <button type="button" data-confirm-company>确认切换</button>
                </div>
              </section>
            </div>
          </section>
          <div id="prototype-toast" class="prototype-toast" role="status" aria-live="polite" hidden></div>
        </div>
      </section>
    </main>

    <script src="./scripts/prototype-data.js"></script>
    <script src="./scripts/metric-data.js"></script>
    <script src="./scripts/app.js"></script>
  </body>
</html>
